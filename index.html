<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="AI MS Tools — личная панель веб-инструментов">
  <meta name="theme-color" content="#0f1117">
  <title>AI MS Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181b24;
      --border: #2a2f3d;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #5b8def;
      --accent-hover: #7aa3f5;
      --green: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(91, 141, 239, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(52, 211, 153, 0.06), transparent);
    }
    .wrap {
      width: 100%;
      max-width: 720px;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px rgba(52, 211, 153, 0.5);
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 560px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
    }
    .card__icon--blue { background: rgba(91, 141, 239, 0.15); }
    .card__icon--green { background: rgba(52, 211, 153, 0.15); }
    .card__title {
      font-size: 1.05rem;
      font-weight: 600;
    }
    .card__desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }
    .card__link {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .card:hover .card__link { color: var(--accent-hover); }
    footer {
      margin-top: auto;
      padding-top: 3rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span class="logo-dot" aria-hidden="true"></span> AI MS</div>
      <h1>Мои инструменты</h1>
      <p class="subtitle">Личная панель веб-приложений</p>
    </header>

    <div class="grid">
      <a class="card" href="/tools/planogram">
        <div class="card__icon card__icon--blue" aria-hidden="true">📐</div>
        <div class="card__title">Планировщик склада</div>
        <p class="card__desc">Редактор планограммы мезонинов: расстановка стеллажей, проходы, печать и сохранение схемы.</p>
        <span class="card__link">Открыть →</span>
      </a>

      <a class="card" href="/vizitka">
        <div class="card__icon card__icon--green" aria-hidden="true">👤</div>
        <div class="card__title">Сайт-визитка</div>
        <p class="card__desc">Личная страница: производство ВСПОМНИ, стартап DoubleMark и контакты.</p>
        <span class="card__link">Открыть →</span>
      </a>
    </div>
  </div>

  <footer>
    <p>© <span id="year"></span> Никита Милашевич</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
